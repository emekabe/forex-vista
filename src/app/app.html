<div class="app-shell" [attr.data-theme]="theme.theme()">
  <app-navbar (menuClick)="toggleSidebar()" />
  <div class="app-body">
    <!-- Mobile backdrop -->
    @if (sidebarOpen()) {
      <div class="sidebar-backdrop" (click)="closeSidebar()"></div>
    }
    <app-sidebar [class.sidebar-open]="sidebarOpen()" (navClick)="closeSidebar()" />
    <div class="app-main">
      <app-price-ticker />
      <main class="page-content">
        <router-outlet />
      </main>
    </div>
  </div>
  <app-toast />
</div>
